<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#090807">
  <meta name="description" content="Listen live to WTinyRadio, check the weekly schedule, and hang out with the community.">
  <meta property="og:title" content="WTinyRadio — Live underground radio">
  <meta property="og:description" content="The best radio station you've never heard before.">
  <meta property="og:image" content="https://www.wtinyradio.com/link.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.wtinyradio.com/">
  <title>WTinyRadio — Live underground radio</title>

  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="icon" href="./favicon-32x32.png" type="image/png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="manifest" href="./site.webmanifest">
  <link rel="preconnect" href="https://app.radiocult.fm">
  <link rel="preconnect" href="https://api.radiocult.fm">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&amp;family=Oswald:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: dark;
      --black: #070706;
      --panel: rgba(9, 10, 10, 0.965);
      --panel-2: #141719;
      --orange: #ff9d27;
      --orange-hot: #ff6211;
      --orange-line: rgba(255, 152, 33, 0.88);
      --blue: #579dff;
      --blue-bright: #73b1ff;
      --text: #f6f3ee;
      --muted: #aaa59d;
      --spotify: #1ed760;
      --radius: 20px;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.54);
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--black);
      scroll-behavior: smooth;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: var(--text);
      font-family: "Montserrat", system-ui, sans-serif;
      background:
        linear-gradient(180deg, rgba(2, 2, 2, 0.24), rgba(2, 2, 2, 0.58) 76%, rgba(2, 2, 2, 0.95)),
        url("./background-optimized.jpg") center top / cover fixed,
        var(--black);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 4% 8%, rgba(255, 138, 22, 0.16), transparent 16%),
        radial-gradient(circle at 96% 8%, rgba(255, 138, 22, 0.16), transparent 16%),
        radial-gradient(circle at 50% 14%, rgba(40, 92, 185, 0.08), transparent 30%);
    }

    a {
      color: inherit;
    }

    button,
    a,
    input {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .skip-link {
      position: fixed;
      top: 10px;
      left: 16px;
      z-index: 100;
      padding: 10px 14px;
      border-radius: 8px;
      background: #fff;
      color: #111;
      font-weight: 800;
      transform: translateY(-180%);
      transition: transform 0.2s ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .site-shell {
      width: min(1420px, calc(100% - 32px));
      margin: 0 auto;
    }

    .site-header {
      position: relative;
      display: flex;
      min-height: 140px;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .brand-lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 13px 0 11px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      text-align: left;
    }

    .brand-mark {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      border-radius: 50%;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(255, 157, 39, 0.2));
    }

    .brand-name {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 3.4vw, 3.25rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.7);
    }

    .brand-tagline {
      margin: 0;
      color: #d1cbc3;
      font-family: "Oswald", sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .studio-grid {
      display: grid;
      grid-template-columns: minmax(300px, 0.95fr) minmax(500px, 1.27fr) minmax(310px, 0.95fr);
      grid-template-areas: "schedule player chat";
      gap: 18px;
      align-items: start;
      padding: 0;
    }

    .panel {
      position: relative;
      display: flex;
      min-width: 0;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--orange-line);
      border-radius: 16px;
      background:
        linear-gradient(160deg, rgba(27, 24, 20, 0.28), transparent 33%),
        var(--panel);
      box-shadow:
        var(--shadow),
        0 0 8px rgba(255, 146, 26, 0.32),
        inset 0 0 24px rgba(255, 112, 14, 0.035);
      isolation: isolate;
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px rgba(255, 206, 137, 0.09);
    }

    .schedule-panel {
      grid-area: schedule;
      height: 688px;
    }

    .chat-panel {
      grid-area: chat;
      height: 688px;
    }

    .player-column {
      grid-area: player;
      display: flex;
      min-width: 0;
      flex-direction: column;
    }

    .player-panel {
      height: 688px;
      border-color: rgba(255, 207, 144, 0.72);
      box-shadow:
        var(--shadow),
        0 0 8px rgba(255, 172, 65, 0.24),
        inset 0 0 30px rgba(255, 153, 38, 0.03);
    }

    .panel-header {
      display: flex;
      min-height: 64px;
      align-items: center;
      gap: 12px;
      padding: 15px 20px 13px;
      border-bottom: 1px solid rgba(255, 167, 52, 0.18);
    }

    .panel-icon {
      display: grid;
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgba(255, 166, 47, 0.32);
      border-radius: 9px;
      color: var(--orange);
    }

    .panel-icon svg,
    .action svg,
    .schedule-link svg,
    .social-link svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.9;
    }

    .panel-heading h2 {
      margin: 0;
      color: var(--orange);
      font-family: "Oswald", sans-serif;
      font-size: 1.17rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-status,
    .schedule-header-link {
      display: none;
    }

    .embed-wrap {
      position: relative;
      display: flex;
      min-height: 0;
      flex: 1;
      margin: 8px 10px 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: #15191c;
    }

    .embed-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      background: #15191c;
    }

    .chat-embed {
      margin-bottom: 10px;
      border-color: rgba(255, 168, 51, 0.15);
      background: #090b0d;
      box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.34);
    }

    .schedule-content {
      display: flex;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      margin: 8px 10px 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 11px;
      background: linear-gradient(160deg, rgba(17, 20, 22, 0.98), rgba(7, 8, 8, 0.98));
    }

    .schedule-days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      min-height: 43px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(20, 22, 23, 0.84);
    }

    .schedule-day-tab {
      min-width: 0;
      padding: 0 3px;
      border: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.045);
      background: transparent;
      color: #d4d0c9;
      font-family: "Oswald", sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .schedule-day-tab:last-child {
      border-right: 0;
    }

    .schedule-day-tab:hover,
    .schedule-day-tab:focus-visible {
      color: #fff;
      background: rgba(255, 157, 39, 0.08);
    }

    .schedule-day-tab[aria-selected="true"] {
      background: linear-gradient(180deg, rgba(255, 157, 39, 0.18), rgba(255, 157, 39, 0.04));
      color: var(--orange);
      box-shadow: inset 0 -2px 0 var(--orange);
    }

    .schedule-date-bar {
      display: flex;
      min-height: 47px;
      align-items: center;
      gap: 9px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--orange);
      font-size: 0.78rem;
    }

    .schedule-date-bar svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
    }

    .schedule-timezone {
      margin-left: auto;
      color: #777a7d;
      font-size: 0.56rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .schedule-list {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      scrollbar-color: rgba(255, 157, 39, 0.42) transparent;
      scrollbar-width: thin;
    }

    .schedule-row {
      display: grid;
      min-height: 66px;
      grid-template-columns: 83px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .schedule-row:last-child {
      border-bottom: 0;
    }

    .schedule-row:hover {
      background: rgba(255, 157, 39, 0.035);
    }

    .schedule-time {
      color: var(--orange);
      font-family: "Oswald", sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .schedule-show strong {
      display: block;
      overflow: hidden;
      color: #f2efea;
      font-size: 0.78rem;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .schedule-show span {
      display: block;
      margin-top: 3px;
      overflow: hidden;
      color: #a7a39d;
      font-size: 0.65rem;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .schedule-group-label {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 7px 13px;
      border-bottom: 1px solid rgba(255, 157, 39, 0.18);
      background: rgba(13, 14, 14, 0.98);
      color: var(--orange);
      font-family: "Oswald", sans-serif;
      font-size: 0.69rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-state {
      display: grid;
      min-height: 160px;
      padding: 22px;
      color: #8d8b87;
      font-size: 0.72rem;
      line-height: 1.6;
      text-align: center;
      place-items: center;
    }

    .schedule-link {
      cursor: pointer;
    }

    .chat-shell {
      position: relative;
      display: flex;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      margin: 8px 10px 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 11px;
      background: linear-gradient(160deg, rgba(16, 19, 21, 0.98), rgba(8, 9, 10, 0.99));
      box-shadow: inset 0 0 26px rgba(0, 0, 0, 0.34);
    }

    .chat-topbar {
      display: flex;
      min-height: 64px;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(20, 23, 25, 0.86);
    }

    .chat-station-avatar,
    .chat-avatar {
      display: grid;
      flex: 0 0 auto;
      overflow: hidden;
      border-radius: 50%;
      place-items: center;
    }

    .chat-station-avatar {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 157, 39, 0.35);
      background: #080808;
    }

    .chat-station-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .chat-station-copy {
      min-width: 0;
      flex: 1;
    }

    .chat-station-copy strong {
      display: block;
      overflow: hidden;
      color: #f6f3ee;
      font-size: 0.78rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-live-count {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
      color: #9b9e9f;
      font-size: 0.59rem;
    }

    .chat-live-count::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #33d265;
      box-shadow: 0 0 7px rgba(51, 210, 101, 0.7);
    }

    .chat-name-button {
      max-width: 118px;
      overflow: hidden;
      padding: 6px 8px;
      border: 1px solid rgba(87, 157, 255, 0.32);
      border-radius: 6px;
      background: rgba(19, 43, 74, 0.42);
      color: var(--blue);
      font-size: 0.6rem;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    .chat-messages {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px 12px;
      scrollbar-color: rgba(255, 255, 255, 0.28) transparent;
      scrollbar-width: thin;
    }

    .chat-message {
      display: grid;
      grid-template-columns: 39px minmax(0, 1fr) auto;
      gap: 9px;
      padding: 10px 2px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.065);
    }

    .chat-message:last-child {
      border-bottom: 0;
    }

    .chat-avatar {
      width: 39px;
      height: 39px;
      align-self: start;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: linear-gradient(145deg, #343b49, #121820);
      color: #fff;
      font-family: "Oswald", sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .chat-avatar.station {
      background: #080808;
    }

    .chat-avatar.station img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .chat-message-copy {
      min-width: 0;
    }

    .chat-user {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--blue);
      font-size: 0.71rem;
      font-weight: 800;
    }

    .chat-user.alt {
      color: var(--orange);
    }

    .chat-verified {
      color: #8b7bff;
      font-size: 0.64rem;
    }

    .chat-message-text {
      margin: 3px 0 0;
      overflow-wrap: anywhere;
      color: #e2dfda;
      font-size: 0.68rem;
      line-height: 1.45;
    }

    .chat-message-time {
      padding-top: 2px;
      color: #8e9295;
      font-size: 0.54rem;
      white-space: nowrap;
    }

    .chat-gif {
      display: block;
      max-width: min(220px, 100%);
      max-height: 165px;
      margin-top: 6px;
      border-radius: 8px;
      object-fit: cover;
    }

    .chat-system-message {
      margin: 7px 4px;
      color: #777b7e;
      font-size: 0.57rem;
      text-align: center;
    }

    .chat-composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(18, 20, 21, 0.92);
    }

    .chat-input {
      width: 100%;
      min-width: 0;
      min-height: 42px;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      outline: 0;
      background: #17191b;
      color: #f4f1ec;
      font-size: 0.68rem;
    }

    .chat-input:focus {
      border-color: rgba(87, 157, 255, 0.72);
      box-shadow: 0 0 0 2px rgba(87, 157, 255, 0.12);
    }

    .chat-input::placeholder {
      color: #797d80;
    }

    .chat-send {
      min-width: 72px;
      min-height: 42px;
      padding: 8px 13px;
      border: 1px solid rgba(87, 157, 255, 0.72);
      border-radius: 8px;
      background: linear-gradient(180deg, #2e68d8, #1c4598);
      color: #fff;
      font-family: "Oswald", sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .chat-send:disabled {
      cursor: wait;
      opacity: 0.55;
    }

    .chat-name-dialog[hidden] {
      display: none;
    }

    .chat-name-dialog {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: grid;
      padding: 20px;
      background: rgba(2, 3, 3, 0.84);
      backdrop-filter: blur(5px);
      place-items: center;
    }

    .chat-name-card {
      width: min(320px, 100%);
      padding: 20px;
      border: 1px solid rgba(255, 157, 39, 0.55);
      border-radius: 12px;
      background: #101214;
      box-shadow: var(--shadow), 0 0 18px rgba(255, 138, 20, 0.15);
    }

    .chat-name-card h3 {
      margin: 0;
      font-family: "Oswald", sans-serif;
      font-size: 1.05rem;
    }

    .chat-name-card p {
      margin: 7px 0 14px;
      color: #999c9e;
      font-size: 0.65rem;
      line-height: 1.5;
    }

    .chat-name-form {
      display: grid;
      gap: 9px;
    }

    .chat-name-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    .chat-name-actions button {
      min-height: 34px;
      padding: 6px 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 7px;
      background: #191c1e;
      color: #f0ede7;
      font-size: 0.64rem;
      cursor: pointer;
    }

    .chat-name-actions .primary {
      border-color: rgba(87, 157, 255, 0.6);
      background: #2456b0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      border: 0;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .schedule-footer {
      display: flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 7px 12px 10px;
    }

    .schedule-link {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 7px 18px;
      border: 1px solid rgba(255, 157, 39, 0.38);
      border-radius: 8px;
      background: transparent;
      color: var(--orange);
      font-size: 0.66rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-transform: uppercase;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .schedule-link svg {
      width: 16px;
      height: 16px;
    }

    .schedule-link:hover {
      border-color: rgba(255, 191, 111, 0.78);
      background: rgba(255, 157, 39, 0.08);
    }

    .live-row {
      display: flex;
      min-height: 63px;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding-top: 8px;
      color: var(--orange-hot);
    }

    .live-wave {
      width: 46px;
      height: 12px;
      opacity: 0.82;
      background: repeating-linear-gradient(90deg, currentColor 0 2px, transparent 2px 5px);
      clip-path: polygon(0 45%, 8% 45%, 8% 25%, 15% 25%, 15% 70%, 23% 70%, 23% 5%, 31% 5%, 31% 95%, 39% 95%, 39% 30%, 47% 30%, 47% 76%, 55% 76%, 55% 15%, 63% 15%, 63% 88%, 71% 88%, 71% 38%, 80% 38%, 80% 62%, 88% 62%, 88% 45%, 100% 45%, 100% 55%, 0 55%);
    }

    .live-badge {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 7px 17px;
      border: 2px solid var(--orange-hot);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(12…10051 tokens truncated…te) {

          return eventStart < dayEnd && eventEnd > dayStart;
        })
        .sort((first, second) => new Date(first.startDateUtc || first.start) - new Date(second.startDateUtc || second.start));
    }

    function makeScheduleRow(event, date) {
      const row = document.createElement("article");
      row.className = "schedule-row";

      const dayStart = new Date(date);
      dayStart.setHours(0, 0, 0, 0);
      const eventStart = new Date(event.startDateUtc || event.start);
      const displayStart = eventStart < dayStart ? dayStart : eventStart;

      const time = document.createElement("time");
      time.className = "schedule-time";
      time.dateTime = eventStart.toISOString();
      time.textContent = formatScheduleTime(displayStart);

      const show = document.createElement("div");
      show.className = "schedule-show";
      const title = document.createElement("strong");
      title.textContent = event.title || "WTinyRadio";

      const details = document.createElement("span");
      const artistNames = Array.isArray(event.artists)
        ? event.artists.map((artist) => artist?.name || artist?.slug).filter(Boolean)
        : [];
      const description = descriptionText(event.description);
      details.textContent = artistNames.length ? `w/ ${artistNames.join(", ")}` : description || "Live on WTinyRadio";

      show.append(title, details);
      row.append(time, show);
      return row;
    }

    function updateScheduleToggleLabels() {
      scheduleToggles.forEach((toggle) => {
        const label = scheduleWeekView ? "View daily schedule" : "View full schedule";
        const text = toggle.querySelector("span");
        if (text) text.textContent = label;
        else toggle.textContent = label;
        toggle.setAttribute("aria-pressed", String(scheduleWeekView));
      });
    }

    function renderScheduleTabs() {
      scheduleDays.replaceChildren();
      for (let index = 0; index < 7; index += 1) {
        const date = scheduleDay(index);
        const button = document.createElement("button");
        button.className = "schedule-day-tab";
        button.type = "button";
        button.role = "tab";
        button.textContent = new Intl.DateTimeFormat(scheduleLocale, { weekday: "short" }).format(date);
        button.setAttribute("aria-selected", String(!scheduleWeekView && selectedScheduleDay === index));
        button.setAttribute("aria-label", new Intl.DateTimeFormat(scheduleLocale, {
          weekday: "long",
          month: "long",
          day: "numeric"
        }).format(date));
        button.addEventListener("click", () => {
          selectedScheduleDay = index;
          scheduleWeekView = false;
          renderSchedule();
        });
        scheduleDays.append(button);
      }
    }

    function appendEmptyScheduleState(container, text) {
      const empty = document.createElement("div");
      empty.className = "panel-state";
      empty.textContent = text;
      container.append(empty);
    }

    function renderSchedule() {
      renderScheduleTabs();
      updateScheduleToggleLabels();
      scheduleList.replaceChildren();
      schedulePanel.classList.toggle("is-week-view", scheduleWeekView);

      if (scheduleWeekView) {
        scheduleDateLabel.textContent = new Intl.DateTimeFormat(scheduleLocale, {
          month: "long",
          day: "numeric"
        }).format(scheduleWeekStart) + " - " + new Intl.DateTimeFormat(scheduleLocale, {
          month: "long",
          day: "numeric"
        }).format(scheduleDay(6));

        let numberOfEvents = 0;
        for (let index = 0; index < 7; index += 1) {
          const date = scheduleDay(index);
          const events = eventsForScheduleDay(date);
          if (!events.length) continue;
          const group = document.createElement("div");
          group.className = "schedule-group-label";
          group.textContent = new Intl.DateTimeFormat(scheduleLocale, {
            weekday: "long",
            month: "short",
            day: "numeric"
          }).format(date);
          scheduleList.append(group);
          events.forEach((event) => scheduleList.append(makeScheduleRow(event, date)));
          numberOfEvents += events.length;
        }
        if (!numberOfEvents) appendEmptyScheduleState(scheduleList, "No shows are scheduled for this week yet.");
        return;
      }

      const date = scheduleDay(selectedScheduleDay);
      scheduleDateLabel.textContent = new Intl.DateTimeFormat(scheduleLocale, {
        weekday: "long",
        month: "long",
        day: "numeric"
      }).format(date);
      const events = eventsForScheduleDay(date);
      if (!events.length) {
        appendEmptyScheduleState(scheduleList, "No shows are scheduled for this day yet.");
        return;
      }
      events.forEach((event) => scheduleList.append(makeScheduleRow(event, date)));
    }

    async function loadWeeklySchedule() {
      scheduleTimezone.textContent = stationTimezone.replaceAll("_", " ");
      const rangeEnd = new Date(scheduleWeekStart);
      rangeEnd.setDate(rangeEnd.getDate() + 7);
      const requestUrl = new URL(`${DATA_API_BASE}/schedule`);
      requestUrl.searchParams.set("start", scheduleWeekStart.toISOString());
      requestUrl.searchParams.set("end", rangeEnd.toISOString());
      requestUrl.searchParams.set("timezone", stationTimezone);

      try {
        const response = await fetch(requestUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`Schedule returned ${response.status}`);
        const data = await response.json();
        weeklySchedule = Array.isArray(data.schedules) ? data.schedules : [];
        renderSchedule();
      } catch (error) {
        scheduleList.replaceChildren();
        appendEmptyScheduleState(scheduleList, "The live schedule is reconnecting. Please check back in a moment.");
        console.info("The live schedule could not be loaded.", error);
      }
    }

    scheduleToggles.forEach((toggle) => {
      toggle.addEventListener("click", () => {
        scheduleWeekView = !scheduleWeekView;
        renderSchedule();
      });
    });

    const chatMessageStore = new Map();
    let chatSocket;
    let chatSocketReady = false;
    let chatReconnectTimer;
    let chatHasRendered = false;
    let chatUser = null;

    try {
      chatUser = JSON.parse(localStorage.getItem("wtinyradio-chat-user") || "null");
    } catch (error) {
      localStorage.removeItem("wtinyradio-chat-user");
    }

    function updateChatIdentity() {
      chatNameButton.textContent = chatUser?.displayName || "Choose name";
      chatInput.placeholder = chatUser ? `Message as ${chatUser.displayName}…` : "Choose a display name to join…";
    }

    function chatCreatedDate(message) {
      const raw = message?.createdAt;
      if (typeof raw === "number") return new Date(raw < 1e12 ? raw * 1000 : raw);
      const parsed = new Date(raw || 0);
      return Number.isNaN(parsed.getTime()) ? new Date(0) : parsed;
    }

    function chatInitials(name) {
      const parts = String(name || "Listener").trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "?";
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return `${parts[0][0]}${parts.at(-1)[0]}`.toUpperCase();
    }

    function alternateChatColor(name) {
      return Array.from(String(name || "")).reduce((total, character) => total + character.charCodeAt(0), 0) % 2 === 1;
    }

    function safeGifUrl(message) {
      const media = message?.content?.media;
      if (!media) return "";
      const id = String(media.id || "").replace(/[^a-zA-Z0-9_-]/g, "");
      if (id) return `https://media.giphy.com/media/${id}/giphy.gif`;
      try {
        const url = new URL(media.url);
        return url.protocol === "https:" && url.hostname.endsWith("giphy.com") ? url.href : "";
      } catch (error) {
        return "";
      }
    }

    function renderChatMessages() {
      const wasNearBottom = chatMessagesElement.scrollHeight - chatMessagesElement.scrollTop - chatMessagesElement.clientHeight < 90;
      const messages = Array.from(chatMessageStore.values())
        .filter((message) => !message.flagged)
        .sort((first, second) => chatCreatedDate(first) - chatCreatedDate(second))
        .slice(-80);

      chatMessagesElement.replaceChildren();
      if (!messages.length) {
        const empty = document.createElement("div");
        empty.className = "panel-state";
        empty.textContent = "The conversation is open. Be the first to say hello.";
        chatMessagesElement.append(empty);
      }

      messages.forEach((message) => {
        if (message.type === "user_joined" || message.type === "user_name_change") {
          const systemMessage = document.createElement("p");
          systemMessage.className = "chat-system-message";
          systemMessage.textContent = message.content?.text || "A listener joined the chat.";
          chatMessagesElement.append(systemMessage);
          return;
        }

        const row = document.createElement("article");
        row.className = "chat-message";
        const isStation = Boolean(message.isStationMessage || message.userId === STATION_ID);

        const avatar = document.createElement("span");
        avatar.className = `chat-avatar${isStation ? " station" : ""}`;
        avatar.setAttribute("aria-hidden", "true");
        if (isStation) {
          const image = document.createElement("img");
          image.src = "./wtinyradio-badge.png";
          image.alt = "";
          avatar.append(image);
        } else {
          avatar.textContent = chatInitials(message.displayName);
        }

        const copy = document.createElement("div");
        copy.className = "chat-message-copy";
        const user = document.createElement("span");
        user.className = `chat-user${alternateChatColor(message.displayName) ? " alt" : ""}`;
        user.textContent = message.displayName || "Listener";
        if (isStation) {
          const verified = document.createElement("span");
          verified.className = "chat-verified";
          verified.textContent = "●";
          verified.title = "Verified station message";
          user.append(verified);
        }
        copy.append(user);

        if (message.type === "gif") {
          const gifUrl = safeGifUrl(message);
          if (gifUrl) {
            const image = document.createElement("img");
            image.className = "chat-gif";
            image.src = gifUrl;
            image.alt = `${message.displayName || "A listener"} shared a GIF`;
            image.loading = "lazy";
            copy.append(image);
          }
        } else {
          const text = document.createElement("p");
          text.className = "chat-message-text";
          text.textContent = message.content?.text || "";
          if (message.type === "heart_reaction") text.style.fontSize = "1.45rem";
          copy.append(text);
        }

        const time = document.createElement("time");
        const created = chatCreatedDate(message);
        time.className = "chat-message-time";
        time.dateTime = created.toISOString();
        time.textContent = new Intl.DateTimeFormat(scheduleLocale, { hour: "numeric", minute: "2-digit" }).format(created);

        row.append(avatar, copy, time);
        chatMessagesElement.append(row);
      });

      if (!chatHasRendered || wasNearBottom) chatMessagesElement.scrollTop = chatMessagesElement.scrollHeight;
      chatHasRendered = true;
    }

    function mergeChatMessages(messages) {
      const list = Array.isArray(messages) ? messages : [messages];
      let changed = false;
      list.forEach((message) => {
        if (!message || message.station !== STATION_ID || !message.id) return;
        const previous = chatMessageStore.get(message.id);
        if (JSON.stringify(previous) !== JSON.stringify(message)) {
          chatMessageStore.set(message.id, message);
          changed = true;
        }
      });
      if (changed) renderChatMessages();
    }

    async function loadChatHistory() {
      try {
        const response = await fetch(`${DATA_API_BASE}/chat`, { cache: "no-store" });
        if (!response.ok) throw new Error(`Chat returned ${response.status}`);
        const data = await response.json();
        mergeChatMessages(data.messages || []);
        if (!chatHasRendered) renderChatMessages();
      } catch (error) {
        if (!chatHasRendered) {
          chatMessagesElement.replaceChildren();
          const state = document.createElement("div");
          state.className = "panel-state";
          state.textContent = "The live chat is reconnecting. Please try again in a moment.";
          chatMessagesElement.append(state);
        }
        console.info("Chat history could not be loaded.", error);
      }
    }

    function parseChatSocketEvent(packet) {
      if (packet === "2") {
        if (chatSocket?.readyState === WebSocket.OPEN) chatSocket.send("3");
        return;
      }
      if (packet.startsWith("0")) {
        if (chatSocket?.readyState === WebSocket.OPEN) chatSocket.send("40");
        return;
      }
      if (packet.startsWith("40")) {
        chatSocketReady = true;
        chatAudience.textContent = "Live chat";
        return;
      }
      if (!packet.startsWith("42")) return;

      try {
        const [eventName, payload] = JSON.parse(packet.slice(2));
        if (eventName === "message") mergeChatMessages(payload?.messages || payload);
        if (eventName === "participants-list-update") {
          const participants = payload?.participants;
          const count = Array.isArray(participants) ? participants.length : Number(participants) || 0;
          chatAudience.textContent = count ? `${count} online` : "Live chat";
        }
      } catch (error) {
        console.info("A chat update could not be read.", error);
      }
    }

    function connectChatSocket() {
      if (chatSocket && (chatSocket.readyState === WebSocket.OPEN || chatSocket.readyState === WebSocket.CONNECTING)) return;
      window.clearTimeout(chatReconnectTimer);
      chatSocketReady = false;
      chatAudience.textContent = "Connecting…";
      chatSocket = new WebSocket(CHAT_SOCKET_URL);
      chatSocket.addEventListener("message", (event) => parseChatSocketEvent(String(event.data)));
      chatSocket.addEventListener("close", () => {
        chatSocketReady = false;
        chatAudience.textContent = "Reconnecting…";
        chatReconnectTimer = window.setTimeout(connectChatSocket, 5000);
      });
      chatSocket.addEventListener("error", () => {
        chatAudience.textContent = "Reconnecting…";
      });
    }

    function waitForChatSocket(timeout = 4500) {
      if (chatSocketReady) return Promise.resolve(true);
      connectChatSocket();
      return new Promise((resolve) => {
        const started = Date.now();
        const interval = window.setInterval(() => {
          if (chatSocketReady || Date.now() - started >= timeout) {
            window.clearInterval(interval);
            resolve(chatSocketReady);
          }
        }, 100);
      });
    }

    function createChatMessage(type, content, user = chatUser) {
      return {
        station: STATION_ID,
        id: typeof crypto.randomUUID === "function" ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        displayName: user.displayName,
        userId: user.userId,
        createdAt: Math.floor(Date.now() / 1000),
        timestampId: "",
        flagged: false,
        type,
        content
      };
    }

    function sendChatSocketMessage(message) {
      if (!chatSocketReady || chatSocket?.readyState !== WebSocket.OPEN) return false;
      chatSocket.send(`42${JSON.stringify(["message", message])}`);
      mergeChatMessages(message);
      return true;
    }

    function openChatNameDialog() {
      chatNameInput.value = chatUser?.displayName || "";
      chatNameDialog.hidden = false;
      window.setTimeout(() => chatNameInput.focus(), 0);
    }

    function closeChatNameDialog() {
      chatNameDialog.hidden = true;
    }

    function createChatUserId() {
      if (typeof crypto.randomUUID === "function") return crypto.randomUUID();
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 12)}`;
    }

    chatNameButton.addEventListener("click", openChatNameDialog);
    chatNameCancel.addEventListener("click", closeChatNameDialog);
    chatInput.addEventListener("focus", () => {
      if (!chatUser) openChatNameDialog();
    });

    chatNameForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const displayName = chatNameInput.value.trim();
      if (displayName.length < 2) return;

      const previousUser = chatUser;
      const submitButton = chatNameForm.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      chatStatus.textContent = "Joining chat…";

      try {
        chatUser = {
          userId: previousUser?.userId || createChatUserId(),
          displayName
        };
        localStorage.setItem("wtinyradio-chat-user", JSON.stringify(chatUser));
        updateChatIdentity();
        closeChatNameDialog();
        chatInput.focus();
        chatStatus.textContent = `Chatting as ${chatUser.displayName}`;

        if (await waitForChatSocket()) {
          const text = previousUser
            ? `${previousUser.displayName} changed their name to ${chatUser.displayName}`
            : `${chatUser.displayName} joined the chat`;
          sendChatSocketMessage(createChatMessage(previousUser ? "user_name_change" : "user_joined", { text }));
        }
      } catch (error) {
        chatStatus.textContent = "Your chat name could not be saved. Please try again.";
        console.info("Chat identity could not be stored.", error);
      } finally {
        submitButton.disabled = false;
      }
    });

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!chatUser) {
        openChatNameDialog();
        return;
      }

      const text = chatInput.value.trim();
      if (!text) return;
      chatSend.disabled = true;
      const connected = await waitForChatSocket();
      if (!connected) {
        chatStatus.textContent = "The chat is reconnecting. Please try sending again.";
        chatSend.disabled = false;
        return;
      }

      const message = createChatMessage("message", { text });
      if (sendChatSocketMessage(message)) {
        chatInput.value = "";
        chatStatus.textContent = "Message sent";
      }
      chatSend.disabled = false;
      chatInput.focus();
    });

    updateChatIdentity();
    renderScheduleTabs();
    loadWeeklySchedule();
    loadChatHistory();
    connectChatSocket();
    window.setInterval(loadChatHistory, 15000);

    radioAudio.volume = 0.8;
    updateVolumeDisplay();
    updateNowPlaying();
    window.setInterval(updateNowPlaying, 15000);
  </script>
</body>
</html>
